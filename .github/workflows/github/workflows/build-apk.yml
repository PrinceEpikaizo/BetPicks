name: Build APK

# Runs on GitHub's servers (which have full internet access to Google's
# Maven repo, unlike the sandbox this project was assembled in), so this
# is the easiest way to get a real, installable .apk without installing
# Android Studio yourself.
#
# After a push, go to the "Actions" tab on GitHub, open the latest run,
# and download the "BetPicks-debug-apk" artifact from the run summary.

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}   # adds a manual "Run workflow" button on GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5   # no committed wrapper needed - this provisions Gradle itself

      - name: Run unit tests
        run: gradle test --no-daemon

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BetPicks-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
